name: build

# Triggers:
#   - push to main: smoke-test the build, don't publish.
#   - push of a tag matching v*: smoke-test + create a release with TTFs.
#   - manual workflow_dispatch: ad-hoc rebuild for testing.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      iosevka_version_override:
        description: "Override IOSEVKA_VERSION (e.g. v34.5.0). Empty = use IOSEVKA_VERSION file."
        required: false
        default: ''

permissions:
  contents: write   # required for release creation on tag push

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout ids-fonts
        uses: actions/checkout@v4

      - name: Resolve upstream versions
        id: vers
        run: |
          if [ -n "${{ inputs.iosevka_version_override }}" ]; then
            IOSEVKA="${{ inputs.iosevka_version_override }}"
          else
            IOSEVKA="$(cat IOSEVKA_VERSION | tr -d '[:space:]')"
          fi
          PHOSPHOR="$(cat PHOSPHOR_VERSION | tr -d '[:space:]')"
          NERDFONTS="$(cat NERDFONTS_VERSION | tr -d '[:space:]')"
          echo "iosevka=$IOSEVKA"     >> "$GITHUB_OUTPUT"
          echo "phosphor=$PHOSPHOR"   >> "$GITHUB_OUTPUT"
          echo "nerdfonts=$NERDFONTS" >> "$GITHUB_OUTPUT"
          echo "Building against:"
          echo "  Iosevka    $IOSEVKA"
          echo "  Phosphor   $PHOSPHOR (both @phosphor-icons/web and /core)"
          echo "  Nerd Fonts $NERDFONTS"

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ttfautohint \
            p7zip-full \
            python3 \
            python3-fonttools \
            curl \
            git \
            ca-certificates
          ttfautohint --version
          python3 --version
          python3 -m fontTools.subset --help >/dev/null && echo "fontTools.subset: available"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- IDS Mono (Phase 1) ---

      - name: Clone Iosevka source at pinned version
        run: |
          git clone --depth 1 --branch "${{ steps.vers.outputs.iosevka }}" \
            https://github.com/be5invis/Iosevka.git iosevka-source
          (cd iosevka-source && git log -1 --pretty=oneline)

      - name: Stage IDS build plan
        run: cp private-build-plans.toml iosevka-source/private-build-plans.toml

      - name: Install Iosevka build deps
        working-directory: iosevka-source
        run: npm install --no-audit --no-fund

      - name: Build IDSMono
        working-directory: iosevka-source
        run: |
          npm run build -- ttf::IDSMono
          ls -la dist/IDSMono/TTF/

      - name: Stage IDS Mono artefacts
        run: |
          mkdir -p out
          cp iosevka-source/dist/IDSMono/TTF/*.ttf out/
          cp private-build-plans.toml out/
          cp IOSEVKA_VERSION out/

      # --- Phosphor (Phase 2a) ---

      - name: Build Phosphor (fetch upstream + emit JSON)
        run: |
          OUT_DIR="$(pwd)/out" bash scripts/fetch-phosphor.sh
          cp PHOSPHOR_VERSION out/

      # --- NFBrand (Phase 2b) ---

      - name: Build NFBrand (subset Nerd Fonts per icons.toml)
        run: |
          OUT_DIR="$(pwd)/out" bash scripts/subset-nerd.sh
          cp NERDFONTS_VERSION out/
          cp icons.toml out/

      # --- Sums + release ---

      - name: Compute SHA256SUMS over everything in out/
        run: |
          # LICENSE bundled per OFL §2 (must travel with the fonts).
          cp LICENSE out/
          (cd out && sha256sum *.ttf *.json | tee SHA256SUMS)
          echo "==> final out/ contents:"
          ls -la out/

      - name: Upload artefacts (every build)
        uses: actions/upload-artifact@v4
        with:
          name: ids-fonts-${{ steps.vers.outputs.iosevka }}-ph${{ steps.vers.outputs.phosphor }}-nf${{ steps.vers.outputs.nerdfonts }}-${{ github.sha }}
          path: out/
          retention-days: 30
          if-no-files-found: error

      - name: Create release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "IDS Fonts $TAG" \
            --notes "Built from: Iosevka ${{ steps.vers.outputs.iosevka }} / Phosphor ${{ steps.vers.outputs.phosphor }} / Nerd Fonts ${{ steps.vers.outputs.nerdfonts }}. SHA256SUMS attached. See ADR-0030 (IDS Mono) and ADR-0044 (Phosphor + NFBrand) in stergiotis/pebble2impl." \
            out/*.ttf \
            out/*.json \
            out/SHA256SUMS \
            out/LICENSE \
            out/private-build-plans.toml \
            out/icons.toml \
            out/IOSEVKA_VERSION \
            out/PHOSPHOR_VERSION \
            out/NERDFONTS_VERSION
