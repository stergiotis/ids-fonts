# NFBrand subset manifest — what gets kept when subsetting Nerd Fonts
# down to the brand-mark slot (Slot B) defined by ADR-0044.
#
# Source: SymbolsNerdFontMono-Regular.ttf at NERDFONTS_VERSION.
# Output: NFBrand.ttf — ~150 KB, contains only the codepoints listed
# here. Produced by scripts/subset-nerd.sh.
#
# Adding a range or codepoint is a deliberate act: a PR appends a row,
# CI re-subsets the font, the SHA256SUMS changes, downstream consumers
# re-pin. This keeps the brand-mark vocabulary explicit.
#
# Rationale per range — see ADR-0044 §SD2:
#   - Devicons: programming-language and developer-tool brand marks
#     (Go, Rust, Python, JavaScript, Docker, Linux, Git, Java, …).
#   - Logos: additional brand marks not in Devicons.
#   - Custom: Nerd Fonts' own one-offs, including the Go gopher mark.
#   - One-off MaterialDesign codepoint (FontAwesome brand mark) is kept
#     by explicit codepoint — used only in the demo carousel.

[[range]]
description = "Devicons (programming language + tool brand marks)"
start = "U+E700"
end = "U+E7C5"

[[range]]
description = "Logos (additional brand marks not in Devicons)"
start = "U+F300"
end = "U+F372"

[[range]]
description = "Custom (Nerd Fonts one-offs, includes the Go gopher)"
start = "U+E5FA"
end = "U+E631"

[[codepoint]]
description = "Material Design Icons — FontAwesome brand mark (one-off)"
value = "U+F003A"
