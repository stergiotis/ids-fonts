# IDS Mono build plan — consumed by the Iosevka customizer at build time.
#
# The Iosevka version this TOML targets lives in ../IOSEVKA_VERSION
# (Makefile + GitHub Actions workflow both read from there). Variant key
# names occasionally drift between Iosevka releases; if a bump introduces
# a rename, the build fails fast and the TOML gets updated in lockstep.
#
# Variant intent — preserve across rename / Iosevka bumps:
#   - single-storey g (signature character)
#   - dotted 0 (numeric-table legibility)
#   - serifed capital I (Il1 disambiguation)
#   - open-bowl 6 / 9 (distinguishable from 8 at small sizes)
#   - high six-pointed asterisk
#   - fourfold @, curly braces
#   - no ligation (data-tables don't benefit from programming ligatures)

[buildPlans.IDSMono]
family = "IDS Mono"
spacing = "term"              # fixed-pitch monospace
serifs = "sans"               # sans-style; no terminal serifs
noCvSs = false                # allow character-variant overrides
noLigation = true             # no ligatures

[buildPlans.IDSMono.variants.design]
g = "single-storey-earless-corner"
zero = "dotted"
asterisk = "hex-high"
at = "fourfold"
brace = "curly"
six = "open-contour"
nine = "open-contour"
capital-i = "serifed"

# Weights: Regular (400), Medium (500), Bold (700) — discrete, no variable
# axis in v1. Italics for each.
#
# NB: weight/slope/width table keys are capitalized per Iosevka convention
# — they become the filename suffix (IDSMono-Regular.ttf, not
# IDSMono-regularupright.ttf as lowercase keys produced in v0.1.0).

[buildPlans.IDSMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.IDSMono.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.IDSMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.IDSMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.IDSMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

# Widths: only Normal — Extended is not part of the IDS Mono spec.
# Without this section Iosevka builds all default widths and the
# release doubles from 6 to 12 TTFs.

[buildPlans.IDSMono.widths.Normal]
shape = 500
menu = 5
css = "normal"
